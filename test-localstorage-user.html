<!DOCTYPE html>
<html>
<head>
    <title>Test localStorage User Data</title>
</head>
<body>
    <h1>localStorage User Data Test</h1>
    <div id="output"></div>
    
    <script>
        const output = document.getElementById('output');
        
        // Check what's in localStorage
        const userData = localStorage.getItem('isafari_user');
        
        if (userData) {
            try {
                const parsed = JSON.parse(userData);
                output.innerHTML = `
                    <h2>✅ User data found in localStorage:</h2>
                    <pre>${JSON.stringify(parsed, null, 2)}</pre>
                    <p><strong>Email:</strong> ${parsed.email || 'N/A'}</p>
                    <p><strong>User Type:</strong> ${parsed.userType || 'N/A'}</p>
                    <p><strong>Token:</strong> ${parsed.token ? 'Present' : 'Missing'}</p>
                    <p><strong>ID:</strong> ${parsed.id || 'N/A'}</p>
                `;
            } catch (e) {
                output.innerHTML = `
                    <h2>❌ Error parsing user data:</h2>
                    <p>${e.message}</p>
                    <pre>${userData}</pre>
                `;
            }
        } else {
            output.innerHTML = `
                <h2>⚠️ No user data found in localStorage</h2>
                <p>Key 'isafari_user' is empty or doesn't exist</p>
                <h3>All localStorage keys:</h3>
                <ul>
                    ${Object.keys(localStorage).map(key => `<li>${key}</li>`).join('')}
                </ul>
            `;
        }
    </script>
</body>
</html>
