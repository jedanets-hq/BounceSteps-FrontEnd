<!DOCTYPE html>
<html>
<head>
    <title>Force Reload - iSafari</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        .container {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            color: #0f3460;
            margin-bottom: 20px;
        }
        .btn {
            background: #e94560;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
            display: inline-block;
        }
        .btn:hover {
            background: #c23b52;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            background: #0f3460;
            border-radius: 5px;
        }
        .success {
            color: #4caf50;
        }
        .error {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Force Reload & Clear Cache</h1>
        <p>Kama provider profile haionekani, bofya button hapa chini ku-clear cache na reload:</p>
        
        <div class="status" id="status">
            Ready to clear cache...
        </div>
        
        <button class="btn" onclick="clearEverything()">🧹 Clear Cache & Reload</button>
        <button class="btn" onclick="goHome()">🏠 Go to Homepage</button>
        
        <h3>Manual Steps:</h3>
        <ol>
            <li>Press <strong>Ctrl + Shift + Delete</strong></li>
            <li>Select "Cached images and files"</li>
            <li>Click "Clear data"</li>
            <li>Press <strong>Ctrl + Shift + R</strong> to hard refresh</li>
        </ol>
    </div>

    <script>
        async function clearEverything() {
            const status = document.getElementById('status');
            status.innerHTML = '⏳ Clearing cache...';
            
            try {
                // Clear all caches
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                    status.innerHTML += '<br>✅ Browser caches cleared';
                }
                
                // Clear localStorage
                localStorage.clear();
                status.innerHTML += '<br>✅ localStorage cleared';
                
                // Clear sessionStorage
                sessionStorage.clear();
                status.innerHTML += '<br>✅ sessionStorage cleared';
                
                // Unregister service workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map(reg => reg.unregister()));
                    if (registrations.length > 0) {
                        status.innerHTML += '<br>✅ Service workers unregistered';
                    }
                }
                
                status.innerHTML += '<br><br><span class="success">✅ All cache cleared! Reloading in 2 seconds...</span>';
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
                
            } catch (error) {
                status.innerHTML = '<span class="error">❌ Error: ' + error.message + '</span>';
            }
        }
        
        function goHome() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
