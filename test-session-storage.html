<!DOCTYPE html>
<html>
<head>
    <title>Test Session Storage</title>
</head>
<body>
    <h1>Session Storage Test</h1>
    <button onclick="checkStorage()">Check Storage</button>
    <pre id="output"></pre>
    
    <script>
        function checkStorage() {
            const key = 'google_registration_data';
            const data = sessionStorage.getItem(key);
            const output = document.getElementById('output');
            
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    output.textContent = JSON.stringify(parsed, null, 2);
                } catch (e) {
                    output.textContent = 'Error parsing: ' + e.message + '\n\nRaw data:\n' + data;
                }
            } else {
                output.textContent = 'No data found in sessionStorage';
            }
        }
        
        // Auto-check on load
        checkStorage();
    </script>
</body>
</html>
