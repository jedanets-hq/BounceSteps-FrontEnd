<!DOCTYPE html>
<html>
<head>
    <title>Test Google Registration Flow</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Test Google Registration Flow</h1>
    
    <div class="section">
        <h2>Step 1: Store Data in SessionStorage</h2>
        <form id="testForm">
            <div>
                <label>Role:</label>
                <select id="role">
                    <option value="traveler">Traveler</option>
                    <option value="service_provider">Service Provider</option>
                </select>
            </div>
            <div>
                <label>Phone:</label>
                <input type="text" id="phone" value="+255123456789" />
            </div>
            <div id="travelerFields">
                <label>First Name:</label>
                <input type="text" id="firstName" value="John" />
                <label>Last Name:</label>
                <input type="text" id="lastName" value="Doe" />
            </div>
            <button type="button" onclick="storeData()">Store Data</button>
        </form>
        <div id="storeResult"></div>
    </div>
    
    <div class="section">
        <h2>Step 2: Check Stored Data</h2>
        <button onclick="checkData()">Check SessionStorage</button>
        <pre id="storedData"></pre>
    </div>
    
    <div class="section">
        <h2>Step 3: Simulate OAuth Redirect</h2>
        <p>This will redirect to Google OAuth and back</p>
        <button onclick="simulateOAuth()">Start OAuth Flow</button>
    </div>
    
    <div class="section">
        <h2>Step 4: Check Data After Redirect</h2>
        <button onclick="checkAfterRedirect()">Check Data</button>
        <pre id="afterRedirectData"></pre>
    </div>
    
    <script>
        const STORAGE_KEY = 'google_registration_data';
        
        function storeData() {
            const role = document.getElementById('role').value;
            const phone = document.getElementById('phone').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            
            const data = {
                userType: role,
                phone: phone,
                firstName: firstName,
                lastName: lastName,
                timestamp: Date.now()
            };
            
            sessionStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            document.getElementById('storeResult').innerHTML = '<p class="success">✅ Data stored successfully!</p>';
            checkData();
        }
        
        function checkData() {
            const stored = sessionStorage.getItem(STORAGE_KEY);
            const output = document.getElementById('storedData');
            
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    output.textContent = JSON.stringify(parsed, null, 2);
                } catch (e) {
                    output.textContent = 'Error: ' + e.message;
                }
            } else {
                output.textContent = 'No data found';
            }
        }
        
        function simulateOAuth() {
            // Store current data
            storeData();
            
            // Simulate redirect to Google OAuth
            alert('Simulating redirect to Google OAuth...\n\nIn real flow, you would be redirected to Google, then back to /google-role-selection?googleData=...');
            
            // Simulate coming back with googleData
            const googleData = {
                googleId: '123456789',
                email: 'test@gmail.com',
                firstName: 'Test',
                lastName: 'User',
                avatarUrl: 'https://example.com/avatar.jpg'
            };
            
            const googleDataBase64 = btoa(JSON.stringify(googleData));
            window.location.href = `/google-role-selection?googleData=${googleDataBase64}`;
        }
        
        function checkAfterRedirect() {
            checkData();
            
            // Also check URL params
            const urlParams = new URLSearchParams(window.location.search);
            const googleData = urlParams.get('googleData');
            
            if (googleData) {
                document.getElementById('afterRedirectData').textContent = 
                    'GoogleData in URL: ' + googleData.substring(0, 50) + '...';
            }
        }
        
        // Auto-check on load
        window.onload = function() {
            checkData();
            checkAfterRedirect();
        };
    </script>
</body>
</html>
