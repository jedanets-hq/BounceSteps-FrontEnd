<!DOCTYPE html>
<html>
<head>
    <title>DEBUG Services API</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>🔍 DEBUG Services API</h1>
    <div id="status">Testing...</div>
    <div id="results"></div>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        async function testAPI() {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            try {
                statusDiv.innerHTML = '<p>📡 Fetching from: ' + API_URL + '/services?limit=12</p>';
                
                const timestamp = new Date().getTime();
                const url = `${API_URL}/services?limit=12&_t=${timestamp}`;
                
                console.log('Fetching from:', url);
                
                const response = await fetch(url, {
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                
                console.log('Response data:', data);
                
                if (data.success && data.services) {
                    statusDiv.innerHTML = `
                        <p class="success">✅ SUCCESS!</p>
                        <p>Services Count: ${data.services.length}</p>
                        <p>Response Status: ${response.status}</p>
                    `;
                    
                    resultsDiv.innerHTML = `
                        <h2>Services:</h2>
                        <pre>${JSON.stringify(data.services, null, 2)}</pre>
                    `;
                } else {
                    statusDiv.innerHTML = `
                        <p class="error">❌ No services found</p>
                        <p>Response: ${JSON.stringify(data)}</p>
                    `;
                }
            } catch (error) {
                statusDiv.innerHTML = `
                    <p class="error">❌ ERROR: ${error.message}</p>
                `;
                console.error('Error:', error);
            }
        }
        
        // Run test
        testAPI();
    </script>
</body>
</html>
