<!DOCTYPE html>
<html>
<head>
    <title>Test Frontend API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2 4px rgba(0,0,0,0.1);
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test Frontend API Connection</h1>
        
        <div>
            <button onclick="testServices()">Test GET /api/services</button>
            <button onclick="testProviders()">Test GET /api/providers</button>
            <button onclick="clearResults()">Clear</button>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const resultsDiv = document.getElementById('results');

        function clearResults() {
            resultsDiv.innerHTML = '';
        }

        async function testServices() {
            resultsDiv.innerHTML = '<p>⏳ Testing /api/services...</p>';
            
            try {
                const response = await fetch(`${API_URL}/services`);
                const data = await response.json();
                
                let html = '<h2 class="success">✅ Services API Response:</h2>';
                html += `<p><strong>Status:</strong> ${response.status}</p>`;
                html += `<p><strong>Success:</strong> ${data.success}</p>`;
                html += `<p><strong>Services Count:</strong> ${data.services ? data.services.length : 0}</p>`;
                html += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = `<h2 class="error">❌ Error:</h2><pre>${error.message}</pre>`;
            }
        }

        async function testProviders() {
            resultsDiv.innerHTML = '<p>⏳ Testing /api/providers...</p>';
            
            try {
                const response = await fetch(`${API_URL}/providers`);
                const data = await response.json();
                
                let html = '<h2 class="success">✅ Providers API Response:</h2>';
                html += `<p><strong>Status:</strong> ${response.status}</p>`;
                html += `<p><strong>Success:</strong> ${data.success}</p>`;
                html += `<p><strong>Providers Count:</strong> ${data.providers ? data.providers.length : 0}</p>`;
                html += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = `<h2 class="error">❌ Error:</h2><pre>${error.message}</pre>`;
            }
        }

        // Auto-test on load
        window.onload = () => {
            testServices();
        };
    </script>
</body>
</html>
