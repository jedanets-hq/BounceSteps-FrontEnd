<!DOCTYPE html>
<html>
<head>
    <title>Test Booking Update</title>
</head>
<body>
    <h1>Test Booking Update</h1>
    <div id="result"></div>
    
    <script>
        async function testBookingUpdate() {
            const resultDiv = document.getElementById('result');
            
            try {
                // Get user from localStorage
                const userString = localStorage.getItem('isafari_user');
                if (!userString) {
                    resultDiv.innerHTML = '<p style="color: red;">❌ No user found in localStorage. Please login first.</p>';
                    return;
                }
                
                const user = JSON.parse(userString);
                resultDiv.innerHTML += `<p>✅ User found: ${user.email}</p>`;
                resultDiv.innerHTML += `<p>✅ User type: ${user.userType}</p>`;
                resultDiv.innerHTML += `<p>✅ Token: ${user.token ? 'Present' : 'Missing'}</p>`;
                
                if (user.userType !== 'service_provider') {
                    resultDiv.innerHTML += '<p style="color: orange;">⚠️ User is not a service provider</p>';
                    return;
                }
                
                // Test 1: Get bookings
                resultDiv.innerHTML += '<h2>Test 1: Get Bookings</h2>';
                const bookingsResponse = await fetch('http://localhost:5000/api/bookings/provider', {
                    headers: {
                        'Authorization': `Bearer ${user.token}`
                    }
                });
                
                const bookingsData = await bookingsResponse.json();
                resultDiv.innerHTML += `<p>Status: ${bookingsResponse.status}</p>`;
                resultDiv.innerHTML += `<p>Bookings found: ${bookingsData.bookings ? bookingsData.bookings.length : 0}</p>`;
                
                if (bookingsData.bookings && bookingsData.bookings.length > 0) {
                    const pendingBooking = bookingsData.bookings.find(b => b.status === 'pending');
                    
                    if (pendingBooking) {
                        resultDiv.innerHTML += `<h2>Test 2: Update Booking ${pendingBooking.id}</h2>`;
                        resultDiv.innerHTML += `<p>Current status: ${pendingBooking.status}</p>`;
                        
                        // Test update
                        const updateResponse = await fetch(`http://localhost:5000/api/bookings/${pendingBooking.id}/status`, {
                            method: 'PATCH',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${user.token}`
                            },
                            body: JSON.stringify({ status: 'confirmed' })
                        });
                        
                        const updateData = await updateResponse.json();
                        resultDiv.innerHTML += `<p>Update status: ${updateResponse.status}</p>`;
                        resultDiv.innerHTML += `<p>Response: ${JSON.stringify(updateData, null, 2)}</p>`;
                        
                        if (updateData.success) {
                            resultDiv.innerHTML += '<p style="color: green;">✅ Update successful!</p>';
                        } else {
                            resultDiv.innerHTML += `<p style="color: red;">❌ Update failed: ${updateData.message}</p>`;
                        }
                    } else {
                        resultDiv.innerHTML += '<p>No pending bookings to test</p>';
                    }
                } else {
                    resultDiv.innerHTML += '<p>No bookings found</p>';
                }
                
            } catch (error) {
                resultDiv.innerHTML += `<p style="color: red;">❌ Error: ${error.message}</p>`;
                console.error('Test error:', error);
            }
        }
        
        // Run test on page load
        testBookingUpdate();
    </script>
</body>
</html>
